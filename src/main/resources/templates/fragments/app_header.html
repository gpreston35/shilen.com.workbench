
<!-- .app-header -->
<header class="app-header app-header-dark">
	<!-- .top-bar -->
	<div class="top-bar">
		<!-- .top-bar-brand -->
		<div class="top-bar-brand">
			<!-- toggle aside menu -->
			<button class="hamburger hamburger-squeeze mr-2" type="button"
				data-toggle="aside-menu" aria-label="toggle aside menu">
				<span class="hamburger-box"><span class="hamburger-inner"></span></span>
			</button>
			<!-- /toggle aside menu -->

			<b>workbench</b>

		</div>
		<!-- /.top-bar-brand -->
		<!-- .top-bar-list -->
		<div class="top-bar-list">
			<!-- .top-bar-item -->
			<div class="top-bar-item px-2 d-md-none d-lg-none d-xl-none">
				<!-- toggle menu -->
				<button class="hamburger hamburger-squeeze" type="button"
					data-toggle="aside" aria-label="toggle menu">
					<span class="hamburger-box"><span class="hamburger-inner"></span></span>
				</button>
				<!-- /toggle menu -->
			</div>
			<!-- /.top-bar-item -->
			<!-- .top-bar-item -->
			<div class="top-bar-item top-bar-item-full">
				<!-- .top-bar-search -->
				<form class="top-bar-search">
					<!-- .input-group -->
					<div class="input-group input-group-search dropdown">
						<div class="input-group-prepend">
							<span class="input-group-text"><span
								class="oi oi-magnifying-glass"></span></span>
						</div>
						<input type="text" class="form-control" data-toggle="dropdown"
							aria-label="Search" placeholder="Search" disabled>
						<!-- .dropdown-menu -->

					</div>
					<!-- /.input-group -->
				</form>
				<!-- /.top-bar-search -->
			</div>
			<!-- /.top-bar-item -->
			<!-- .top-bar-item -->
			<div class="top-bar-item top-bar-item-right px-0 d-none d-sm-flex">
				<!-- .nav -->
				<ul class="header-nav nav">
					<!-- .nav-item -->


				</ul>
				<!-- /.nav -->
				<!-- .btn-account -->
				<div class="dropdown d-flex">
					<button class="btn-account d-none d-md-flex" type="button"
						data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
						<span class="user-avatar user-avatar-md"><img
							th:src="@{/assets/images/avatars/unknown-profile.jpg}" alt=""></span>
						<span class="account-summary pr-lg-4 d-none d-lg-block"><span
							class="account-name" sec:authentication="name"></span>
					</button>
					<!-- .dropdown-menu -->
					<div class="dropdown-menu">
						<div class="dropdown-arrow ml-3"></div>
						<h6 class="dropdown-header d-none d-md-block d-lg-none">
							<span sec:authentication="name"></span>span>
						</h6>
						<a class="dropdown-item" href="#l"><span
							class="dropdown-icon oi oi-person"></span> Profile</a> <a
							class="dropdown-item" th:href="@{/logout}"><span
							class="dropdown-icon oi oi-account-logout"></span> Logout</a>
					</div>
					<!-- /.dropdown-menu -->
				</div>
				<!-- /.btn-account -->
			</div>
			<!-- /.top-bar-item -->
		</div>
		<!-- /.top-bar-list -->
	</div>
	<!-- /.top-bar -->
</header>
<!-- /.app-header -->
