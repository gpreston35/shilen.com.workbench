<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<div th:replace="fragments/header"></div>




</head>
<body>
	<!-- .app -->
	<div class="app">
		<!--[if lt IE 10]>
      <div class="page-message" role="alert">You are using an <strong>outdated</strong> browser. Please <a class="alert-link" href="http://browsehappy.com/">upgrade your browser</a> to improve your experience and security.</div>
      <![endif]-->


		<div th:replace="fragments/app_header"></div>

		<div th:replace="fragments/sidebar"></div>

		<!-- .app-main -->
		<main class="app-main">
			<!-- .wrapper -->
			<div class="wrapper">
				<!-- .page -->
				<div class="page">
					<!-- .page-inner -->
					<div class="page-inner">
						<!-- .page-title-bar -->
						<header class="page-title-bar"> </header>
						<!-- /.page-title-bar -->

						<div class="page-section">

							<!-- .page-section -->

							<span class="h5 m-0 font-weight-bold text-primary">RUNOUT</span>


							<div class="card card-fluid" style="margin-top: 15px;">
								<div class="card-header">
									<span class="h6 m-0 font-weight-bold text-primary">SEARCH</span>
								</div>
								<!-- /.card-header -->

								<div class="card-body">
									<!-- .table -->

									<form id="searchForm" th:action="@{/ro/search}" th:object="${SEARCH_FORM}"
										method="post" >
										
										<a type="button" class="btn btn-primary btn-sm" style="margin-bottom: 20px" th:href="@{/ro/add}">&nbsp;&nbsp;Add&nbsp;&nbsp;</a>

										<div class="form-row">
											<!-- form row -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="woid">Workorder ID</label>
												<input type="text" class="form-control form-control-sm"
													id="woid" name="woid" th:field="*{woid}">
											</div>
											<!-- /form column -->

											<div class="col-md-6 mb-3">
												<!-- form column -->

											</div>
											<!-- /form column -->
										</div>
										<!-- /form row -->


										<div class="form-row">
											<!-- form row -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="woid">From Date</label> <input
													id="fromDateInput" type="text"
													class="form-control form-control-sm"
													data-toggle="flatpickr" name="fromDateInput"
													th:field="*{fromDateInput}">
											</div>
											<!-- /form column -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="woid">To Date</label> <input
													id="toDateInput" type="text"
													class="form-control form-control-sm"
													data-toggle="flatpickr" name="toDateInput"
													th:field="*{toDateInput}">
											</div>
											<!-- /form column -->
										</div>
										<!-- /form row -->


										<div class="form-row">
											<!-- form row -->
											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="operator_id">Operator</label>
												<select name="operator_id" th:field="*{operator_id}"
													class="form-control form-control-sm">
													<option value="-1"></option>
													<option th:each="c:${OPERATORS}" th:value="${c.id}"
														th:utext="${c.value}" />
												</select>
											</div>


											<!-- /form column -->
											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="spindle_id">Spindles</label>
												<select name="spindle_id" th:field="*{spindle_id}"
													class="form-control form-control-sm">
													<option value="-1"></option>
													<option th:each="c:${SPINDLES}" th:value="${c.id}"
														th:utext="${c.value}" />
												</select>
											</div>

										</div>
										<!-- /form row -->


										<div class="form-row">
											<!-- form row -->
											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="Caliber">Caliber</label> <select
													name="caliber_id" th:field="*{caliber_id}"
													class="form-control form-control-sm">
													<option value="-1"></option>
													<option th:each="c:${CALIBERS}" th:value="${c.id}"
														th:utext="${c.value}" />
												</select>
											</div>
											<!-- /form column -->
											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="steel">Steel</label> <select
													name="steel_id" th:field="*{steel_id}"
													class="form-control form-control-sm">
													<option value="-1"></option>
													<option th:each="c:${STEEL}" th:value="${c.id}"
														th:utext="${c.value}" />
												</select>
											</div>

										</div>


										<div class="form-row">
											<!-- form row -->
											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="view">Type</label> 
												<select
													name="view" th:field="*{view}"
													class="form-control form-control-sm">
													<option value="data">Data</option>
													<option value="pivot">Pivot</option>
												</select>
											</div>
											<!-- /form column -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="view">Pivot Field</label> 
												<select
													name="pivot_field" th:field="*{pivot_field}"
													class="form-control form-control-sm">
													<option value="c.caliber">Caliber</option>
													<option value="o.operator">Operator</option>
													<option value="date_format(run_date,'%Y-%m-%d')">Run Date</option>
													<option value="s.spindle">Spindle</option>
													<option value="st.heat_name">Steel</option>
													
												</select>
											</div>
											<!-- /form column -->
										</div>


										<button type="submit" class="btn btn-primary">Search</button>
										<button type="button" class="btn btn-warning" onclick="resetSearchForm()">&nbsp;Reset&nbsp;</button>


									</form>

								</div>

								<div class="card card-fluid" style="margin-top: 25px;">
									<div class="card-header">
										<span class="h6 m-0 font-weight-bold text-primary">RESULTS</span>
									</div>
									<!-- /.card-header -->

									<div class="card-body">
										<!-- .table -->
										

										<table class="table table-hover table-sm table-bordered"
											id="results" th:if="${SEARCH_FORM.view!='pivot'}">
											<thead>
												<tr>
													<th></th>
													<th>RUN DATE</th>
													<th>CALIBER</th>
													<th>SPINDLE</th>
													<th>OPERATOR</th>
													<th>STEEL</th>
													<th>LENGTH</th>
													<th>REDRILL</th>
													<th>SCRAP</th>
													<th>MUZZLE TIR</th>
													<th>CHAMBER TIR</th>
												</tr>
											</thead>
											<tbody>
												<tr th:each="r: ${RESULTS}" th:classappend="${r.scrapreason_id > 0} ? 'bg-danger'" >
													<td><a th:href="@{'/ro/edit'(id=${r.id})}"
														role="button" class="btn btn-sm btn-icon btn-secondary"><i
															class="far fa-edit"></i></a></td>
													<td th:text="${r.run_date}" />
													<td th:text="${r.caliber}"  />
													<td th:text="${r.spindle}" class="text-right" />
													<td th:text="${r.operator}" />
													<td th:text="${r.heat_name}" />
													<td th:text="${r.length}" class="text-right" />
													<td th:text="${r.redrill}"  />
													<td th:text="${r.scrap}"  />
													<td th:text="${r.muzzle_tir}" class="text-right" />
													<td th:text="${r.chamber_tir}" class="text-right" />
												</tr>
											</tbody>
										</table>
										
										
										
										<table class="table table-hover table-sm table-bordered"
											id="results" th:if="${SEARCH_FORM.view=='pivot'}">
											<thead>
												<tr>
													<th>PIVOT</th>
													<th>MUZZLE MAX</th>
													<th>MUZZLE AVG</th>
													<th>MUZZLE STD</th>
													<th>CHAMBER MAX</th>
													<th>CHAMBER AVG</th>
													<th>CHAMBER STD</th>
													<th>SAMPLES</th>
													<th>REDRILL</th>
													<th># BARS</th>
													<th>SCRAP</th>
													<th>SCRAP %</th>
												</tr>
											</thead>
											<tbody>
												<tr th:each="r: ${RESULTS}">
													<td th:text="${r.pivot_field}" />
													<td th:text="${r.muzzle_max}" class="text-right" />
													<td th:text="${r.muzzle_avg}" class="text-right" />
													<td th:text="${r.muzzle_std}" class="text-right" />
													<td th:text="${r.chamber_max}" class="text-right" />
													<td th:text="${r.chamber_avg}" class="text-right" />
													<td th:text="${r.chamber_std}" class="text-right" />
													<td th:text="${r.samples}" class="table-info text-right"  />
													<td th:text="${r.redrill}" class="table-info text-right"/>
													<td th:text="${r.num_bars}" class="table-info text-right"/>
													<td th:text="${r.scrap}" class="table-info text-right"/>
													<td th:text="${r.scrap_p}" class="table-info text-right"/>
												</tr>
											</tbody>
										</table>

									</div>
									<!-- /.card-body -->
								</div>
								<!-- /.card -->

							</div>


						</div>
						<!-- /.page-section -->
					</div>
					<!-- /.page-inner -->
				</div>
				<!-- /.page -->
			</div>

			<div th:replace="fragments/footer"></div>


			<!-- /.wrapper -->
		</main>
		<!-- /.app-main -->
	</div>
	<!-- /.app -->


	<!-- BEGIN BASE JS -->
	<script th:src="@{/assets/vendor/jquery/jquery.min.js}"
		type="text/javascript"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/popper.min.js}"
		type="text/javascript"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/bootstrap.min.js}"
		type="text/javascript"></script>
	<!-- END BASE JS -->
	<!-- BEGIN PLUGINS JS -->
	<script th:src="@{/assets/vendor/pace/pace.min.js}"
		type="text/javascript"></script>
	<script th:src="@{/assets/vendor/stacked-menu/stacked-menu.min.js}"
		type="text/javascript"></script>
	<script
		th:src="@{/assets/vendor/perfect-scrollbar/perfect-scrollbar.min.js}"
		type="text/javascript"></script>
	<script th:src="@{/assets/vendor/flatpickr/flatpickr.min.js}"
		type="text/javascript"></script>

	<!-- BEGIN THEME JS -->
	<script th:src="@{/assets/javascript/theme.min.js}"
		type="text/javascript"></script>
	<!-- END THEME JS -->

	<!-- Page level plugins -->
	<script th:src="@{/assets/vendor/datatables/jquery.dataTables.min.js}"
		type="text/javascript"></script>
	<script
		th:src="@{/assets/vendor/datatables/dataTables.bootstrap4.min.js}"
		type="text/javascript"></script>

	<!-- Page level plugins -->
	<script th:src="@{/assets/vendor/chart.js/Chart.min.js}"
		type="text/javascript"></script>



	<script type="text/javascript">
		$(document).ready(function() {
			$('#results').DataTable({
				lengthMenu: [ 50, 25, -1]
			});
		});
		
		function resetSearchForm() {	

			$('#searchForm').find("input[type=text], textarea").val("");

		}
		
		
	</script>


</body>
</html>
