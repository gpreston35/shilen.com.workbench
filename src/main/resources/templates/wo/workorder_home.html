<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<div th:replace="fragments/header"></div>


</head>
<body>
	<!-- .app -->
	<div class="app">
		<!--[if lt IE 10]>
      <div class="page-message" role="alert">You are using an <strong>outdated</strong> browser. Please <a class="alert-link" href="http://browsehappy.com/">upgrade your browser</a> to improve your experience and security.</div>
      <![endif]-->

		<div th:replace="fragments/app_header"></div>

		<div th:replace="fragments/sidebar"></div>

		<!-- .app-main -->
		<main class="app-main">
			<!-- .wrapper -->
			<div class="wrapper">
				<!-- .page -->
				<div class="page">
					<!-- .page-inner -->
					<div class="page-inner">
						<!-- .page-title-bar -->
						<header class="page-title-bar"> </header>
						<!-- /.page-title-bar -->

						<div class="page-section">

							<!-- .page-section -->


							<span class="h5 m-0 font-weight-bold text-primary">WORKORDER</span>
							

							


					<p><a type="button" class="btn btn-primary btn-sm" th:href="@{/wo/add}" style="margin-top: 10px;">Add Workorder</a>
							


							<div class="card card-fluid" style="margin-top: 15px;">
								<div class="card-header"><span class="h6 m-0 font-weight-bold text-primary">SEARCH</span></div>
								<!-- /.card-header -->

								<div class="card-body">
									<!-- .table -->

									<form th:action="@{/wo/search}" th:object="${FORM}" method="post">

										<div class="form-row">
											<!-- form row -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="woid">Workorder ID</label>
												<input type="text" class="form-control form-control-sm" id="woid"
													name="woid" th:field="*{woid}">
											</div>
											<!-- /form column -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="status_id">Status</label>
												<select name="status_id" th:field="*{status_id}"
													id="status_id" class="form-control  form-control-sm">
													<option value=-1></option>
													<option th:each="s:${STATUS}" th:value="${s.id}"
														th:utext="${s.value}" />
												</select>
											</div>
											<!-- /form column -->
										</div>
										<!-- /form row -->


										<div class="form-row">
											<!-- form row -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="woid">From Date</label> <input
													id="fromDateInput" type="text" class="form-control form-control-sm"
													data-toggle="flatpickr" name="fromDateInput"
													th:field="*{fromDateInput}">
											</div>
											<!-- /form column -->

											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="woid">To Date</label> <input
													id="toDateInput" type="text" class="form-control form-control-sm"
													data-toggle="flatpickr" name="toDateInput"
													th:field="*{toDateInput}">
											</div>
											<!-- /form column -->
										</div>
										<!-- /form row -->


										<div class="form-row">
											<!-- form row -->
											<div class="col-md-6 mb-3">
												<!-- form column -->
												<label class="control-label" for="Caliber">Caliber</label> <select
													name="caliber_id" th:field="*{caliber_id}"
													class="form-control form-control-sm">
													<option value=-1></option>
													<option th:each="c:${CALIBERS}" th:value="${c.id}"
														th:utext="${c.value}" />
												</select>
											</div>
											<!-- /form column -->
										</div>
										<!-- /form row -->


										<button type="submit" class="btn btn-primary btn-sm">Search</button>

									</form>

								</div>

							</div>



							<div class="card card-fluid" style="margin-top: 25px;">
								<div class="card-header"><span class="h6 m-0 font-weight-bold text-primary">RESULTS</span></div>
								<!-- /.card-header -->

								<div class="card-body">
									<!-- .table -->


									<table class="table table-hover table-sm table-bordered"
										id="results">
										<thead>
											<tr>
												<th></th>
												<th>WO ID</th>
												<th>CREATED</th>
												<th>STATUS</th>
												<th>CALIBER</th>
												<th>STEEL</th>
												<th>RIFLING</th>
											</tr>
										</thead>
										<tbody>
											<tr th:each="r: ${RESULTS}">
												<td><a th:href="@{'/wo/edit'(id=${r.woid})}"    role="button" class="btn btn-sm btn-icon btn-secondary"><i class="far fa-edit"></i></a> 
										<!-- 		<a th:href="@{'/wo/quality'(id=${r.woid})}" role="button" class="btn btn-sm btn-icon btn-secondary"><i class="fas fa-balance-scale-right"></i></a> -->
													<a th:href="@{'/wo/view'(id=${r.woid})}"    role="button" class="btn btn-sm btn-icon btn-secondary"><i class="fas fa-print"></i></a>
												<td th:text="${r.woid}" />
												<td th:text="${r.created}" />
												<td th:text="${r.status}" />
												<td th:text="${r.caliber}" />
												<td th:text="${r.steeltype}" />
												<td th:text="${r.rifling}" />
											</tr>
										</tbody>
									</table>



								</div>
								<!-- /.card-body -->
							</div>
							<!-- /.card -->


						</div>
						<!-- /.page-section -->
					</div>
					<!-- /.page-inner -->
				</div>
				<!-- /.page -->
			</div>

			<div th:replace="fragments/footer"></div>


			<!-- /.wrapper -->
		</main>
		<!-- /.app-main -->
	</div>
	<!-- /.app -->


	<!-- BEGIN BASE JS -->
	<script th:src="@{/assets/vendor/jquery/jquery.min.js}"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/popper.min.js}"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/bootstrap.min.js}"></script>
	<!-- END BASE JS -->
	<!-- BEGIN PLUGINS JS -->
	<script th:src="@{/assets/vendor/pace/pace.min.js}"></script>
	<script th:src="@{/assets/vendor/stacked-menu/stacked-menu.min.js}"></script>
	<script th:src="@{/assets/vendor/perfect-scrollbar/perfect-scrollbar.min.js}"></script>
	<script th:src="@{/assets/vendor/flatpickr/flatpickr.min.js}"></script>

	<!-- BEGIN THEME JS -->
	<script th:src="@{/assets/javascript/theme.min.js}"></script>
	<!-- END THEME JS -->

	<!-- Page level plugins -->
	<script th:src="@{/assets/vendor/datatables/jquery.dataTables.min.js}"></script>
	<script
		th:src="@{/assets/vendor/datatables/dataTables.bootstrap4.min.js}"></script>



	<script>
    
	    $(document).ready(function() {
	        $('#results').DataTable();
	    } );
	    
    </script>


</body>
</html>
