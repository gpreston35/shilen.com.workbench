<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

  <head>
  
	<div th:replace="fragments/header"></div>
  
  
  </head>
  <body>
    <!-- .app -->
    <div class="app">
      <!--[if lt IE 10]>
      <div class="page-message" role="alert">You are using an <strong>outdated</strong> browser. Please <a class="alert-link" href="http://browsehappy.com/">upgrade your browser</a> to improve your experience and security.</div>
      <![endif]-->
      
      
    	<div th:replace="fragments/app_header"></div>  
	
		<div th:replace="fragments/sidebar"></div>
      
      <!-- .app-main -->
      <main class="app-main">
        <!-- .wrapper -->
        <div class="wrapper">
          <!-- .page -->
          <div class="page">
            <!-- .page-inner -->
            <div class="page-inner">
              <!-- .page-title-bar -->


              <!-- .page-section -->

          <div class="page has-sidebar has-sidebar-expand-xl">
            <!-- .page-inner -->
            <div class="page-inner">

				<header class="page-title-bar">
                <!-- .breadcrumb -->
                <nav aria-label="breadcrumb">
                  <ol class="breadcrumb">
                    <li class="breadcrumb-item active">
                      <a href="javascript:window.history.back()"><i class="breadcrumb-icon fa fa-angle-left mr-2"></i>Workorders</a>
                    </li>
                  </ol>
                </nav><!-- /.breadcrumb -->
                <div class="d-md-flex">
                  <h1 class="page-title"> Workorder #<span th:text="${ID}"></span> </h1>
                </div>
              </header><!-- /.page-title-bar -->
              <!-- .page-section -->
              <div class="page-section">
                <!-- .section-block -->
                <div class="section-block">
                  <!-- .invoice-wrapper -->
                  <div class="invoice-wrapper">
                    <!-- .invoice-actions -->
                    
                    <!-- .invoice -->
                    
                   
                   		<embed th:src="@{'/wo/pdf'(id=${ID})}" width="800" height="800" type='application/pdf'>
                   
                        
                      
                    </div><!-- /.invoice -->
                  </div><!-- /.invoice-wrapper -->
                </div><!-- /.section-block -->
              </div><!-- /.page-section -->

              

<!-- .page-sidebar -->
            <div class="page-sidebar">
              <!-- .card -->
              <div class="card card-reflow">
                <div class="card-body">
                  <h4 class="card-title"> Progress </h4>
                  <div class="progress progress-sm rounded-0 mb-1">
                    <div class="progress-bar bg-success w-10" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <p class="text-muted text-weight-bolder small">  </p>
                </div><!-- .card-body -->
                <div class="card-body border-top">
                  <h4 class="card-title"> History </h4><!-- .timeline -->
                  <ul class="timeline timeline-dashed-line">
                  
                    <!-- .timeline-item -->
                    <li class="timeline-item">
                      <!-- .timeline-figure -->
                      <div class="timeline-figure">
                        <span class="tile tile-circle tile-xs bg-success"><i class="fa fa-check"></i></span>
                      </div><!-- /.timeline-figure -->
                      <!-- .timeline-body -->
                      <div class="timeline-body">
                        <h6 class="timeline-heading"> Workorder created </h6><span class="timeline-date"><span th:text="${CREATED}"></span></span>
                      </div><!-- /.timeline-body -->
                    </li><!-- /.timeline-item -->
                  
                  
                     <li class="timeline-item">
                      <!-- .timeline-figure -->
                      <div class="timeline-figure">
                        <span class="tile tile-circle tile-xs"><i class="fa fa-check d-none"></i></span>
                      </div><!-- /.timeline-figure -->
                      <!-- .timeline-body -->
                      <div class="timeline-body">
                        <h6 class="timeline-heading"> Drill </h6>
                      </div><!-- /.timeline-body -->
                    </li><!-- /.timeline-item -->
                    <!-- .timeline-item -->                    
                    
 
                    
                    <li class="timeline-item">
                      <!-- .timeline-figure -->
                      <div class="timeline-figure">
                        <span class="tile tile-circle tile-xs"><i class="fa fa-check d-none"></i></span>
                      </div><!-- /.timeline-figure -->
                      <!-- .timeline-body -->
                      <div class="timeline-body">
                        <h6 class="timeline-heading"> Quality </h6>
                      </div><!-- /.timeline-body -->
                    </li><!-- /.timeline-item -->
                    <!-- .timeline-item -->                    
                    
                    
                    <li class="timeline-item">
                      <!-- .timeline-figure -->
                      <div class="timeline-figure">
                        <span class="tile tile-circle tile-xs"><i class="fa fa-check d-none"></i></span>
                      </div><!-- /.timeline-figure -->
                      <!-- .timeline-body -->
                      <div class="timeline-body">
                        <h6 class="timeline-heading"> Inventory </h6>
                      </div><!-- /.timeline-body -->
                    </li><!-- /.timeline-item -->
                    <!-- .timeline-item -->
                    
                    <li class="timeline-item">
                      <!-- .timeline-figure -->
                      <div class="timeline-figure">
                        <span class="tile tile-circle tile-xs"><i class="fa fa-check d-none"></i></span>
                      </div><!-- /.timeline-figure -->
                      <!-- .timeline-body -->
                      <div class="timeline-body">
                        <h6 class="timeline-heading"> Complete </h6>
                      </div><!-- /.timeline-body -->
                    </li><!-- /.timeline-item -->
                  
                  </ul><!-- /.timeline -->
                </div><!-- /.card-body -->
              </div><!-- /.card -->
            </div><!-- /.page-sidebar -->
        </div>      
              


            </div><!-- /.page-inner -->
          </div><!-- /.page -->
        </div>
        
		<div th:replace="fragments/footer"></div>
        
        
        <!-- /.wrapper -->
      </main><!-- /.app-main -->
    </div><!-- /.app -->
    
    
    <!-- BEGIN BASE JS -->
    <script th:src="@{/assets/vendor/jquery/jquery.min.js}"></script>
    <script th:src="@{/assets/vendor/bootstrap/js/popper.min.js}"></script>
    
    <script th:src="@{/assets/vendor/bootstrap/js/bootstrap.min.js}"></script> <!-- END BASE JS -->
    <!-- BEGIN PLUGINS JS -->
    <script th:src="@{/assets/vendor/pace/pace.min.js}"></script>
    <script th:src="@{/assets/vendor/stacked-menu/stacked-menu.min.js}"></script>
    <script th:src="@{/assets/vendor/perfect-scrollbar/perfect-scrollbar.min.js}"></script>
    <script th:src="@{/assets/vendor/flatpickr/flatpickr.min.js}"></script>

    <!-- BEGIN THEME JS -->
    <script src="/assets/javascript/theme.min.js"></script> <!-- END THEME JS -->
    

    
    

    
    
  </body>
</html>
