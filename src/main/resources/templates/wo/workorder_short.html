<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<div th:replace="fragments/header"></div>

<style type="text/css">
.qbox {
	border-radius: 3px;
	background: #346cb0;
	padding: 3px;
	height: 25px;
	color: white;
	margin-bottom: 10px;
}

    div.alert-messages {
        position: fixed;
        top: 150px;
        left: 5%;
        right: 5%;
        z-index: 7000;
    }
    
</style>


</head>
<body>
	<!-- .app -->
	<div class="app">
		<!--[if lt IE 10]>
      <div class="page-message" role="alert">You are using an <strong>outdated</strong> browser. Please <a class="alert-link" href="http://browsehappy.com/">upgrade your browser</a> to improve your experience and security.</div>
      <![endif]-->


		<div th:replace="fragments/app_header"></div>

		<div th:replace="fragments/sidebar"></div>

		<!-- .app-main -->
		<main class="app-main">
			<!-- .wrapper -->
			<div class="wrapper">
				<!-- .page -->
				<div class="page">
					<!-- .page-inner -->
					<div class="page-inner">
						<!-- .page-title-bar -->

						<!--  Start  -->





						<div style="margin-right: 10px; margin-left: 10px; margin-top: 10px;">
						
						<div class="btn-group d-flex col-md-6">
								<input type="button" role="button" class="btn btn-danger" value="Close" onclick="self.close()">
						</div>
							
						
						
						
						<div class="d-lg-none">hide on screens wider than lg</div>
<div class="d-none d-lg-block">hide on screens smaller than lg</div>

							<h5>
								WORKORDER&nbsp;#<span th:text="${WO.woid}"></span>
							</h5>


							<table class="table table-sm col-md-6"
								style="margin-bottom: 10px; margin-top: 10px;">
								<tr>
									<td>CREATED</td>
									<td th:text="${WO.created}" />
								</tr>
								<tr>
									<td>STATUS</td>
									<td th:text="${WO.status}" />
								</tr>
								<tr>
									<td>CALIBER</td>
									<td th:text="${WO.caliber}" />
								</tr>
								<tr>
									<td>STEEL TYPE</td>
									<td th:text="${WO.steeltype}" />
								</tr>
								<tr>
									<td>RIFLING</td>
									<td th:text="${WO.rifling}" />
								</tr>

							</table>
							
							
							<div class="alert-messages text-center " style="margin-right: 10px; margin-left: 10px;">
        					</div>
        
							
							

							<div class="btn-group d-flex col-md-6">
								<a th:href="@{'/wo/quality'(id=${WO.woid})}"  role="button" class="btn btn-primary">Quality</a>
							</div>


							<form id="noteform">
								<div class="form-group col-md-6" >
								
									<textarea name="note" rows="4" class="form-control" style="margin-top: 10px;" id="form-note"></textarea>
									<input type="hidden" name="woid" th:field="${WO.woid}"/>

								</div>
								
								
	<div class="btn-group d-flex col-md-6">
							<button type="submit" class="btn btn-primary">Save</button>
						</div>

							</form>



						</div>


					



						<!--  ************************ Body Content End / Start Modals *************************************************** -->


				<div class="modal fade" id="notify_saved" tabindex="-1"
							role="dialog" aria-labelledby="confirmModalLabel"
							aria-hidden="true">
							
					<div class="alert alert-primary has-icon col-md-6" role="alert" id="alert_saved">
                        <div class="alert-icon">
                          <span class="oi oi-info"></span>
                        </div>This is a primary alert with <a href="#" class="alert-link">an example link</a>. Give it a click if you like.
                      </div>		
							
				</div>
							


						<!-- DEL Confirmation Modal -->
						<div class="modal fade" id="confirmModal" tabindex="-1"
							role="dialog" aria-labelledby="confirmModalLabel"
							aria-hidden="true">
							<div class="modal-dialog" role="document">
								<div class="modal-content">
									<div class="modal-header">
										<h5 class="modal-title" id="exampleModalLabel">DELETE</h5>
										<button type="button" class="close" data-dismiss="modal"
											aria-label="Close">
											<span aria-hidden="true">&times;</span>
										</button>
									</div>
									<div class="modal-body">Do you want to delete this scrap
										record?</div>
									<div class="modal-footer">
										<button type="button" class="btn btn-secondary"
											data-dismiss="modal">NO</button>
										<a href="javascript:deleteAfterConfirmation()" role="button"
											class="btn btn-danger">YES</a>
									</div>
								</div>
							</div>
						</div>


						<!-- ****************  End Modals ******************* -->




					</div>
					<!-- /.page-inner -->
				</div>
				<!-- /.page -->
			</div>

			<div th:replace="fragments/footer"></div>


			<!-- /.wrapper -->
		</main>
		<!-- /.app-main -->
	</div>
	<!-- /.app -->


	<!-- BEGIN BASE JS -->
	<script th:src="@{/assets/vendor/jquery/jquery.min.js}" type="text/javascript"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/popper.min.js}" type="text/javascript"></script>

	<script th:src="@{/assets/vendor/bootstrap/js/bootstrap.min.js}" type="text/javascript"></script>
	<!-- END BASE JS -->
	<!-- BEGIN PLUGINS JS -->
	<script th:src="@{/assets/vendor/pace/pace.min.js}" type="text/javascript"></script>
	<script th:src="@{/assets/vendor/stacked-menu/stacked-menu.min.js}" type="text/javascript"></script>
	<script
		th:src="@{/assets/vendor/perfect-scrollbar/perfect-scrollbar.min.js}" type="text/javascript"></script>
	<script th:src="@{/assets/vendor/flatpickr/flatpickr.min.js}" type="text/javascript"></script>
	<script
		th:src="@{/assets/vendor/bootstrap-touchspin/jquery.bootstrap-touchspin.min.js}" type="text/javascript"></script>
	<!-- END PLUGINS JS -->

	<!-- BEGIN THEME JS -->
	<script th:src="@{/assets/javascript/theme.min.js}" type="text/javascript"></script>
	<!-- END THEME JS -->
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.1/jquery.validate.min.js" type="text/javascript"></script>


<script type="text/javascript">

$(document).ready(function() {
	

		$('#noteform').bind('submit', function(event) {
	
			event.preventDefault();// using this page stop being refreshing 
			
			
			if ( $('#form-note').val().length < 3) 
				showAndDismissAlert('info', 'Nothing to save.');
			
			else {
			

				$.ajax({
					type : 'POST',
					url : '/wo/short/update',
					data : $('form').serialize(),
					success : function(data) {
						
		
						// Clear out form vars
						$('#form-note').val('');
						showAndDismissAlert('success', 'Saved Successfully!');
	
		
		
		
					},
					error: function(xhr, ajaxOptions, thrownError) {
		                  alert(thrownError + "\r\n" + xhr.statusText + "\r\n" + xhr.responseText);
		            }
				});
			
			}
	
		});


});

function showAndDismissAlert(type, message) {
    var htmlAlert = '<div class="alert alert-' + type + '">' + message + '</div>';

    // Prepend so that alert is on top, could also append if we want new alerts to show below instead of on top.
    $(".alert-messages").prepend(htmlAlert);

    // Since we are prepending, take the first alert and tell it to fade in and then fade out.
    // Note: if we were appending, then should use last() instead of first()
    $(".alert-messages .alert").first().hide().fadeIn(200).delay(2000).fadeOut(1000, function () { $(this).remove(); });
}



</script>


</body>
</html>
